name: test

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
      - run: go build ./...
      - run: gofmt -d .
      - run: go vet ./...
      - run: go mod tidy -diff
      - run: go fix -diff ./...
      - run: go test -v ./...
